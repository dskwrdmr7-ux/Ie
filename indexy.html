<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>اخبار الاقتصاد الإيرانية </title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family: "Courier New", monospace;
    color:#00ff00;
}

/* المحتوى */
.container{
    position:relative;
    z-index:3;
    display:flex;
    height:100vh;
    align-items:center;
    justify-content:space-between;
    padding:50px;
}

.text-section{
    width:50%;
}

.text-section h1{
    font-size:40px;
    text-shadow:0 0 20px #00ff00;
}

.typing{
    font-size:22px;
    border-right:2px solid #00ff00;
    white-space:nowrap;
    overflow:hidden;
    width:0;
    animation: typing 4s steps(40, end) forwards, blink 0.7s infinite;
}

@keyframes typing{
    from{width:0}
    to{width:100%}
}

@keyframes blink{
    50%{border-color:transparent}
}

/* الصورة */
.image-section{
    width:40%;
    display:flex;
    justify-content:center;
}

.image-section img{
    width:320px;
    border-radius:10px;
    box-shadow:0 0 30px #00ff00;
}

/* طبقة الدم */
.blood{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

.drop{
    position:absolute;
    top:-50px;
    width:8px;
    height:30px;
    background:linear-gradient(to bottom,#5c0000,#ff0000);
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}

/* دم متجمع تحت */
.blood-bottom{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    height:120px;
    background:linear-gradient(to top,#8b0000,transparent);
    z-index:2;
    pointer-events:none;
}
</style>
</head>

<body>

<div class="blood" id="blood"></div>
<div class="blood-bottom"></div>

<div class="container">
    <div class="text-section">
        <h1>SECURITY SIMULATION MODE</h1>

        <!-- غير النص هنا -->
        <p class="typing">
            السلام عليكم ورحمة الله وبركاته تم اختراق الموقع من وهم الكويتي هاردلك إيران 
        </p>
    </div>

    <div class="image-section">
        <img src="D4986C7A-6810-43C0-BD19-699543DFFFFE.jpeg">
    </div>
</div>

<script>
const bloodContainer = document.getElementById("blood");

for(let i=0;i<100;i++){
    let drop = document.createElement("div");
    drop.classList.add("drop");
    drop.style.left = Math.random() * 100 + "vw";
    drop.style.animationDuration = (Math.random() * 3 + 2) + "s";
    drop.style.opacity = Math.random();
    bloodContainer.appendChild(drop);
}
</script>

</body>
</html>
